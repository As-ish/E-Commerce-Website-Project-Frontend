<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Details</title>
</head>
<body style="background-color:lightgrey">
    <header>
        <h1 style="text-align:center" style="font-family:'Times New Roman', Times, serif">Personal Details</h1>
    </header>
    <hr>
    <p>First Name:</p>
    <input type="text">
    <p>Last Name:</p>
    <input type="text">
    <p>Date of birth:</p>
    <input type="text">
    <p>Mobile no.</p>
    <input type="text">
    <p>City:</p>
    <select>
        <option value="delhi">delhi</option>
        <option value="budaun">budaun</option>
        <option value="bareilly">bareilly</option>
        <option value="mumbai">mumbai</option>
        <option value="pune">pune</option>
    </select>
    <p>Country:</p>
    <select>
        <option value="India">India</option>
        <option value="Pakistan">Pakistan</option>
        <option value="America">America</option>
        <option value="China">China</option>
        <option value="Japan">Japan</option>
    </select>
    <p>Pin code:</p>
    <input type="text">
    <p>Home no.</p>
    <input type="text">
    <p>Address:</p>
    <textarea type="address" placeholder="write your address"></textarea>
    <button style="background-color:orangered">
        <a href="http://127.0.0.1:5500/firstpage.html" style="color:white">Submit</a>
    </button>

</body>
</html>
